<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>TO DO</title>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/add">Task Manager</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/add">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/dashboard">Dashboard</a>
                </li>

            </ul>
            <a href="\logout"><button class="btn btn-primary">Logout</button></a>
        </div>
    </div>
</nav>
<style>
    body {
        background-color: #0f172a;
    }
</style>
</head>

<body>


<div class="container my-5 p-4 rounded" style="background-color:#1e293b; color:white;">
    <h2>Update Your Todo</h2>
    <form action="/update/{{todo.sno}}" method="POST">
        <div class="container my-3">
            <div class="row g-3 align-items-end">

                <!-- Title -->
                <div class="col-md-3">
                    <label for="title" class="form-label">Todo Title</label>
                    <input type="text" class="form-control" name="title" id="title" value="{{todo.title}}">
                </div>

                <!-- Description -->
                <div class="col-md-3">
                    <label for="desc" class="form-label">Todo Description</label>
                    <input type="text" class="form-control" name="description" value="{{todo.description}}" id="desc">
                </div>

                <!-- Due Date -->
                <div class="col-md-2">
                    <label for="due_date" class="form-label">Due Date</label>
                    <input type="date" class="form-control" name="due_date" value="{{todo.due_date}}" id="due_date">
                </div>

                <!-- Priority -->
                <div class="col-md-2">
                    <b><label class="form-label">Priority</label></b>

                    <select class="form-select" name="priority" required>
                        <option value="low" {% if todo.priority=='low' %}selected{% endif %}>Low</option>
                        <option value="medium" {% if todo.priority=='medium' %}selected{% endif %}>Medium</option>
                        <option value="high" {% if todo.priority=='high' %}selected{% endif %}>High</option>

                    </select>
                </div>

                <!-- Status -->
                <div class="col-md-2">
                    <b><label class="form-label">Status</label></b>

                    <select class="form-select" name="status" required>
                        <option value="Pending" {% if todo.status=='Pending' %}selected{% endif %}>Pending</option>
                        <option value="Complete" {% if todo.status=='Complete' %}selected{% endif %}>Complete</option>
                    </select>
                </div>

                <!-- Button -->
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">
                        Add Task
                    </button>
                </div>

            </div>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</body>
 
</html>
